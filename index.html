<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>JustStreamIt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <header>
    <img class="header-logo" src="images/juststreamit-logo.png" alt="JustStreamIt" width="160" height="40">
    <h1>Vidéos à la demande</h1>
  </header>


  <main>

    <!-- ── Meilleur film ── -->
    <section class="films-section" aria-labelledby="best-title">
      <h2 class="section-title" id="best-title">Meilleur film</h2>
      <div class="best-film" id="best-film">
        <div class="best-film__media">
          <img class="best-film__poster" id="best-film-poster" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjwvc3ZnPg==" alt="Chargement de l'affiche du film">
        </div>
        <div class="best-film__info">
          <h2 id="best-film-title">Chargement…</h2>
          <p class="best-film__description" id="best-film-description"></p>
          <button type="button" class="btn-red best-film__details-btn" id="best-film-details-btn" disabled>Détails</button>
        </div>
      </div>
    </section>

    <!-- ── Films les mieux notés (les 6 suivants après le meilleur film, chargés via API) ── -->
    <section class="films-section" aria-labelledby="top-title">
      <h2 class="section-title" id="top-title">Films les mieux notés</h2>
      <div class="films-grid films-grid--category" id="top-rated-grid"></div>
      <button type="button" class="btn-red btn-category-expand" id="top-rated-expand-btn" aria-expanded="false" aria-controls="top-rated-grid">Voir plus</button>
    </section>

    <!-- ── Mystery (catégorie 1) — chargée via API (genre Mystery) ── -->
    <section class="films-section" aria-labelledby="mystery-title">
      <h2 class="section-title" id="mystery-title">Mystery</h2>
      <div class="films-grid films-grid--category" id="mystery-grid"></div>
      <button type="button" class="btn-red btn-category-expand" id="mystery-expand-btn" aria-expanded="false" aria-controls="mystery-grid">Voir plus</button>
    </section>

    <!-- Catégorie 2 (fixe : Famille) -->
    <section class="films-section" aria-labelledby="cat2-title">
      <h2 class="section-title" id="cat2-title">Famille</h2>
      <div class="films-grid films-grid--category" id="cat2-grid"></div>
      <button type="button" class="btn-red btn-category-expand" id="cat2-expand-btn" aria-expanded="false" aria-controls="cat2-grid">Voir plus</button>
    </section>

    <!-- ── Autres : menu déroulant ── -->
    <section class="autres-section" aria-labelledby="autres2-label">
      <div class="autres-dropdown-row">
        <h2 class="autres-label" id="autres2-label">Autres:</h2>
        <select class="autres-select" id="cat-select" aria-label="Choisir une catégorie" disabled>
          <option value="">Chargement des genres…</option>
        </select>
      </div>
    </section>

    <!-- Catégorie choisie dans « Autres » (libellé = option du select) -->
    <section class="films-section" aria-labelledby="dynamic-title">
      <h2 class="section-title" id="dynamic-title">Catégorie</h2>
      <div class="category-grid-shell" id="dynamic-grid-shell">
        <div class="films-grid films-grid--category" id="dynamic-grid"></div>
      </div>
      <button type="button" class="btn-red btn-category-expand" id="dynamic-expand-btn" aria-expanded="false" aria-controls="dynamic-grid">Voir plus</button>
    </section>

  </main>


  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-film-title">
    <div class="modal">

      <button type="button" class="modal__close" onclick="closeModal()" aria-label="Fermer la modale"><span aria-hidden="true">×</span></button>

      <!-- Contenu rempli par fillModalFromDetail() à l’ouverture (fetch API) -->
      <div class="modal__layout">
        <div class="modal__intro">
          <h2 id="modal-film-title">Film</h2>
          <div class="modal__meta"></div>
          <div class="modal__director-block">
            <p class="modal__director-label">Réalisé par:</p>
            <p class="modal__director-name"></p>
          </div>
          <p class="modal__description"></p>
        </div>
        <div class="modal__poster-wrap">
          <img class="modal__poster" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjwvc3ZnPg==" alt="Chargement de l'affiche du film">
        </div>
        <div class="modal__cast-block">
          <p class="modal__cast-label">Avec:</p>
          <p class="modal__cast"></p>
        </div>
      </div>

      <button type="button" class="modal__btn-close" onclick="closeModal()">Fermer</button>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
